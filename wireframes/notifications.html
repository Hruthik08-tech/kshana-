<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notifications — KSHANA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Familjen+Grotesk:wght@400;500;600;700&family=Work+Sans:wght@400;500;600&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --border: #e2e8f0;
      --navy: #1a2b4c;
      --navy-60: rgba(26, 43, 76, 0.6);
      --navy-35: rgba(26, 43, 76, 0.35);
      --navy-12: rgba(26, 43, 76, 0.08);
      --blue: #4a8bdd;
      --blue-light: #6ba4e9;
      --blue-tint: #f1f7fe;
      --overlay: rgba(15, 23, 42, 0.5);
      /* Dimmed background */
    }

    body {
      font-family: 'Work Sans', sans-serif;
      background: var(--bg);
      color: var(--navy);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── NAVBAR ─── */
    .navbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: relative;
      z-index: 100;
    }

    .navbar-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 40px;
      height: 80px;
      display: flex;
      align-items: center;
      gap: 32px;
    }

    .logo {
      font-family: 'Familjen Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1.6rem;
      letter-spacing: -0.02em;
      color: var(--navy);
      text-decoration: none;
    }

    .search-bar {
      flex: 1;
      max-width: 500px;
      position: relative;
    }

    .search-bar input {
      width: 100%;
      padding: 12px 16px 12px 48px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #f1f5f9;
      font-size: 0.95rem;
      outline: none;
    }

    .search-icon {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--navy-35);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 32px;
      margin-left: auto;
    }

    .nav-link {
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--navy-60);
      text-decoration: none;
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .notif-trigger {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      background: transparent;
      border: none;
      color: var(--navy);
      transition: background 0.2s;
    }

    .notif-trigger:hover {
      background: var(--blue-tint);
    }

    .notif-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 8px;
      height: 8px;
      background: var(--blue);
      border-radius: 50%;
      border: 2px solid #fff;
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #e2f2ff;
      color: var(--blue);
      font-family: 'Familjen Grotesk', sans-serif;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ─── CATEGORY BAR ─── */
    .cat-bar {
      background: var(--surface);
      padding: 24px 0;
      border-bottom: 1px solid var(--border);
    }

    .cat-bar-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 40px;
      display: flex;
      justify-content: center;
      gap: 12px;
    }

    .cat-pill {
      padding: 10px 24px;
      border-radius: 999px;
      font-weight: 600;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--navy-60);
      background: transparent;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
    }

    .cat-pill.active {
      background: var(--navy);
      color: #fff;
      border-color: var(--navy);
    }

    /* ─── NOTIFICATION MODAL & FOCUSED OVERLAY ─── */
    .notif-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--overlay);
      backdrop-filter: blur(8px);
      /* Focused blur effect */
      z-index: 1000;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 100px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .notif-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .notif-modal {
      width: 100%;
      max-width: 520px;
      background: var(--surface);
      border-radius: 28px;
      box-shadow: 0 32px 64px rgba(0, 0, 0, 0.2);
      max-height: 75vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transform: translateY(-20px) scale(0.98);
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .notif-overlay.open .notif-modal {
      transform: translateY(0) scale(1);
    }

    .notif-modal-header {
      padding: 28px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .notif-modal-title {
      font-family: 'Familjen Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1.4rem;
    }

    .notif-modal-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px 24px 32px;
      background: #fafbfc;
    }

    .mark-all-btn {
      color: var(--blue);
      background: var(--blue-tint);
      border: none;
      padding: 8px 16px;
      border-radius: 999px;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
    }

    /* ─── NOTIF CARDS ─── */
    .section-label {
      font-family: 'Familjen Grotesk', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--navy-35);
      padding: 24px 8px 12px;
      display: flex;
      justify-content: space-between;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .notif-card {
      background: var(--surface);
      border-radius: 20px;
      border: 1px solid var(--border);
      padding: 20px;
      margin-bottom: 12px;
      display: flex;
      gap: 16px;
      position: relative;
      transition: all 0.2s ease;
    }

    .notif-card.is-unread {
      border-color: rgba(74, 139, 221, 0.25);
      cursor: pointer;
    }

    .notif-card.is-unread:hover {
      border-color: var(--blue-light);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
    }

    .notif-card.is-read {
      opacity: 0.6;
      filter: grayscale(0.5);
    }

    .notif-icon {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .notif-content {
      flex: 1;
    }

    .notif-meta {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .notif-tag {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .notif-time {
      font-size: 0.75rem;
      color: var(--navy-35);
    }

    .notif-title {
      font-family: 'Familjen Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1.05rem;
      margin-bottom: 4px;
    }

    .notif-msg {
      font-size: 0.88rem;
      color: var(--navy-60);
      line-height: 1.5;
    }

    .unread-dot {
      width: 10px;
      height: 10px;
      background: var(--blue);
      border-radius: 50%;
      position: absolute;
      right: 20px;
      top: 24px;
    }

    /* ─── TOAST ─── */
    #toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--navy);
      color: #fff;
      padding: 14px 28px;
      border-radius: 14px;
      font-size: 0.9rem;
      font-weight: 500;
      opacity: 0;
      transition: all 0.3s;
      z-index: 2000;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>

<body onload="toggleModal(true)"> <!-- Auto-open for demo of notification page -->

  <nav class="navbar">
    <div class="navbar-inner">
      <a class="logo" href="#">KSHANA</a>
      <div class="search-bar">
        <svg class="search-icon" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"
          viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8" />
          <path d="M21 21l-4.35-4.35" />
        </svg>
        <input type="text" placeholder="Search events, organizers, or locations...">
      </div>
      <div class="nav-links">
        <a class="nav-link" href="#">Bookings</a>
        <a class="nav-link" href="#">Discover</a>
        <div class="nav-actions">
          <button class="notif-trigger" onclick="toggleModal(true)">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0" />
            </svg>
            <div class="notif-badge" id="badge"></div>
          </button>
          <div class="avatar">H</div>
        </div>
      </div>
    </div>
  </nav>

  <div class="cat-bar">
    <div class="cat-bar-inner">
      <button class="cat-pill active">All</button>
      <button class="cat-pill">Music</button>
      <button class="cat-pill">Comedy</button>
      <button class="cat-pill">Business</button>
      <button class="cat-pill">Horror</button>
      <button class="cat-pill">Sports</button>
      <!-- Theatre removed -->
    </div>
  </div>

  <!-- Focused Notification View -->
  <div class="notif-overlay" id="overlay" onclick="handleOverlayClick(event)">
    <div class="notif-modal">
      <div class="notif-modal-header">
        <h3 class="notif-modal-title">Notifications</h3>
        <button class="mark-all-btn" onclick="markAllRead()">Mark all read</button>
      </div>
      <div class="notif-modal-body" id="notif-list">
        <!-- Injected Content -->
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    let notifications = [
      { id: 1, type: 'SUCCESS', title: 'Booking Confirmed', msg: 'Your payment for Seat A12 at Global Tech Summit was successful.', time: 'Just now', seen: false },
      { id: 2, type: 'WARNING', title: 'Seat Expiring Soon', msg: 'You have 30 seconds left to complete your payment for Seat A12.', time: '2 mins ago', seen: false },
      { id: 3, type: 'FAILED', title: 'Payment Failed', msg: 'We could not process your transaction. Seat A12 remains locked for 1 min.', time: '3 mins ago', seen: false },
      { id: 4, type: 'WARNING', title: 'Booking Cancelled', msg: 'Your reservation for Seat B04 has elapsed and was released.', time: '1 day ago', seen: true }
    ];

    const CONFIG = {
      SUCCESS: { color: '#10b981', bg: 'rgba(16,185,129,0.1)', label: 'Confirmed', icon: 'M5 13l4 4L19 7' },
      WARNING: { color: '#f59e0b', bg: 'rgba(245,158,11,0.1)', label: 'Alert', icon: 'M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z' },
      FAILED: { color: '#ef4444', bg: 'rgba(239,68,68,0.09)', label: 'Failed', icon: 'M6 18L18 6M6 6l12 12' }
    };

    function toggleModal(show) {
      const overlay = document.getElementById('overlay');
      if (show) {
        overlay.classList.add('open');
        document.body.style.overflow = 'hidden';
      } else {
        overlay.classList.remove('open');
        document.body.style.overflow = 'auto';
      }
    }

    function handleOverlayClick(e) {
      if (e.target.id === 'overlay') toggleModal(false);
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    function markRead(id) {
      const n = notifications.find(x => x.id === id);
      if (n && !n.seen) {
        n.seen = true;
        render();
        showToast('Marked as read');
      }
    }

    function markAllRead() {
      notifications.forEach(n => n.seen = true);
      render();
      showToast('All notifications cleared');
    }

    function render() {
      const list = document.getElementById('notif-list');
      const badge = document.getElementById('badge');
      list.innerHTML = '';

      const unreadCount = notifications.filter(n => !n.seen).length;
      badge.style.display = unreadCount > 0 ? 'block' : 'none';

      const groups = {
        'Today': notifications.filter(n => n.time !== '1 day ago'),
        'Earlier': notifications.filter(n => n.time === '1 day ago')
      };

      for (const [label, items] of Object.entries(groups)) {
        if (!items.length) continue;

        const sec = document.createElement('div');
        sec.className = 'section-label';
        sec.innerHTML = `<span>${label}</span> <span>${items.length}</span>`;
        list.appendChild(sec);

        items.forEach(n => {
          const cfg = CONFIG[n.type];
          const card = document.createElement('div');
          card.className = `notif-card ${n.seen ? 'is-read' : 'is-unread'}`;
          if (!n.seen) card.onclick = () => markRead(n.id);

          card.innerHTML = `
            <div class="notif-icon" style="background:${cfg.bg}">
              <svg width="22" height="22" fill="none" stroke="${cfg.color}" stroke-width="2.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="${cfg.icon}"/>
              </svg>
            </div>
            <div class="notif-content">
              <div class="notif-meta">
                <span class="notif-tag" style="color:${cfg.color}">${cfg.label}</span>
                <span class="notif-time">${n.time}</span>
              </div>
              <div class="notif-title">${n.title}</div>
              <div class="notif-msg">${n.msg}</div>
            </div>
            ${!n.seen ? '<div class="unread-dot"></div>' : ''}
          `;
          list.appendChild(card);
        });
      }
    }

    render();
  </script>
</body>

</html>
