<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Onboarding Flow</title>
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.9.10/dist/dotlottie-wc.js" type="module"></script>

</head>
<body class="antialiased bg-slate-50 flex items-center justify-center min-h-screen p-4 font-sans">

  <div class="w-full max-w-md bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col">
    
    <div class="px-8 pt-8 pb-4">
      <div class="flex items-center justify-between gap-2 mb-8" id="progress-bars">
        <div class="h-1.5 flex-1 rounded-full transition-colors duration-300 bg-blue-600 step-bar" data-step="1"></div>
        <div class="h-1.5 flex-1 rounded-full transition-colors duration-300 bg-slate-100 step-bar" data-step="2"></div>
        <div class="h-1.5 flex-1 rounded-full transition-colors duration-300 bg-slate-100 step-bar" data-step="3"></div>
      </div>
      <span class="text-xs font-semibold tracking-wider text-slate-400 uppercase mb-2 block" id="step-label">
        Step 1 of 3
      </span>
    </div>

    <div class="px-8 pb-8 min-h-[320px] relative">
      
      <div id="step-1" class="step-content block animate-in fade-in duration-500">
        <h1 class="text-2xl font-semibold tracking-tight text-slate-900 mb-2">What are you into?</h1>
        <p class="text-base text-slate-500 mb-6">Select up to 3 categories.</p>
        
        <div class="flex flex-wrap gap-2" id="category-container">
          </div>
        <p class="text-xs text-slate-400 mt-4 h-4 font-medium" id="category-counter">0/3 selected</p>
      </div>

      <div id="step-2" class="step-content hidden animate-in fade-in duration-500">
        <h1 class="text-2xl font-semibold tracking-tight text-slate-900 mb-2">Where are you based?</h1>
        <p class="text-base text-slate-500 mb-6">To show you local events and creators.</p>
        
        <div class="grid grid-cols-2 gap-3" id="city-container">
          </div>
      </div>

      <div id="step-3" class="step-content hidden flex-col items-center justify-center text-center py-8 animate-in fade-in duration-500">
        <div class="flex items-center justify-center mb-6">
          <dotlottie-wc 
            src="https://lottie.host/31df0624-f572-41e0-83e5-428eb3174b5f/HC0BzHLp4g.lottie"
            style="width: 100%;"
            autoplay 
            loop>
          </dotlottie-wc>
        </div>

        <h1 class="text-2xl font-semibold tracking-tight text-slate-900 mb-2">You're all set</h1>
        <p class="text-base text-slate-500 mb-6 max-w-[250px]" id="success-message">
          Your profile is ready.
        </p>
        <div class="flex flex-wrap justify-center gap-2 mb-2" id="summary-pills">
           </div>
      </div>

    </div>

    <div class="p-6 border-t border-slate-100 flex items-center justify-between bg-slate-50/50">
      <button id="btn-back" class="text-sm font-medium px-4 py-2 transition-colors text-slate-400 hover:text-slate-900 disabled:opacity-0 disabled:pointer-events-none cursor-pointer" disabled>
        Back
      </button>
      <button id="btn-next" class="px-6 py-2.5 rounded-lg text-sm font-medium transition-all duration-200 bg-slate-100 text-slate-400 cursor-not-allowed" disabled>
        Continue
      </button>
    </div>

  </div>

  <script>
    const state = {
      step: 1,
      maxCategories: 3,
      selectedCategories: [],
      selectedCity: null,
      categories: ["Music", "Business", "Cooking", "Spiritual", "Tech", "Education", "Sports"],
      cities: ["Bangalore", "Chennai", "Delhi", "Mumbai", "Kolkata", "Odisha"]
    };

    // DOM Elements
    const elements = {
      stepLabel: document.getElementById('step-label'),
      stepBars: document.querySelectorAll('.step-bar'),
      steps: [
        document.getElementById('step-1'),
        document.getElementById('step-2'),
        document.getElementById('step-3')
      ],
      btnBack: document.getElementById('btn-back'),
      btnNext: document.getElementById('btn-next'),
      categoryContainer: document.getElementById('category-container'),
      cityContainer: document.getElementById('city-container'),
      categoryCounter: document.getElementById('category-counter'),
      successMessage: document.getElementById('success-message'),
      summaryPills: document.getElementById('summary-pills')
    };

    // Initialize UI
    function init() {
      renderCategories();
      renderCities();
      updateUI();
      
      elements.btnNext.addEventListener('click', () => {
        if (state.step < 3) {
          state.step++;
          updateUI();
        } else {
          console.log("Form Submitted:", { categories: state.selectedCategories, city: state.selectedCity });
          alert("Profile completed! Check console for data.");
        }
      });

      elements.btnBack.addEventListener('click', () => {
        if (state.step > 1) {
          state.step--;
          updateUI();
        }
      });
    }

    // Render Category Buttons
    function renderCategories() {
      elements.categoryContainer.innerHTML = state.categories.map(cat => {
        const isSelected = state.selectedCategories.includes(cat);
        const isMaxReached = state.selectedCategories.length >= state.maxCategories && !isSelected;
        
        let classes = "px-4 py-2.5 rounded-full text-sm font-medium transition-all duration-200 border cursor-pointer select-none ";
        if (isSelected) {
          classes += "bg-blue-600 border-blue-600 text-white shadow-md shadow-blue-200";
        } else {
          classes += "bg-white border-slate-200 text-slate-600 hover:border-slate-300 hover:bg-slate-50";
        }
        if (isMaxReached) {
          classes += " opacity-40 pointer-events-none";
        }

        return `<button type="button" class="${classes}" onclick="toggleCategory('${cat}')">${cat}</button>`;
      }).join('');
      
      elements.categoryCounter.textContent = `${state.selectedCategories.length}/${state.maxCategories} selected`;
      validateStep();
    }

    // Handle Category Click
    window.toggleCategory = (cat) => {
      if (state.selectedCategories.includes(cat)) {
        state.selectedCategories = state.selectedCategories.filter(c => c !== cat);
      } else if (state.selectedCategories.length < state.maxCategories) {
        state.selectedCategories.push(cat);
      }
      renderCategories();
    };

    // Render City Buttons
    function renderCities() {
      elements.cityContainer.innerHTML = state.cities.map(city => {
        const isSelected = state.selectedCity === city;
        
        let containerClasses = "flex items-center p-4 rounded-xl border text-left transition-all duration-200 cursor-pointer select-none ";
        containerClasses += isSelected 
          ? "border-blue-600 bg-blue-50 ring-1 ring-blue-600" 
          : "border-slate-200 bg-white hover:border-slate-300 hover:bg-slate-50";
          
        let radioClasses = "w-4 h-4 rounded-full border mr-3 flex items-center justify-center transition-colors ";
        radioClasses += isSelected ? "border-blue-600" : "border-slate-300";

        let dot = isSelected ? `<div class="w-2 h-2 rounded-full bg-blue-600"></div>` : "";
        let textClass = isSelected ? "text-slate-900" : "text-slate-600";

        return `
          <button type="button" class="${containerClasses}" onclick="selectCity('${city}')">
            <div class="${radioClasses}">${dot}</div>
            <span class="text-sm font-medium ${textClass}">${city}</span>
          </button>
        `;
      }).join('');
      validateStep();
    }

    // Handle City Click
    window.selectCity = (city) => {
      state.selectedCity = city;
      renderCities();
    };

    // Update Navigation and Progress UI
    function updateUI() {
      // Toggle Step Visibility
      elements.steps.forEach((el, index) => {
        if (index + 1 === state.step) {
          el.classList.remove('hidden');
          if(state.step === 3) el.classList.add('flex'); else el.classList.add('block');
        } else {
          el.classList.add('hidden');
          el.classList.remove('flex', 'block');
        }
      });

      // Update Progress Bars
      elements.stepBars.forEach((bar, index) => {
        if (index + 1 <= state.step) {
          bar.classList.add('bg-blue-600');
          bar.classList.remove('bg-slate-100');
        } else {
          bar.classList.add('bg-slate-100');
          bar.classList.remove('bg-blue-600');
        }
      });

      elements.stepLabel.textContent = `Step ${state.step} of 3`;
      
      // Update Back Button
      elements.btnBack.disabled = state.step === 1;

      // Update Next Button Text
      elements.btnNext.textContent = state.step === 3 ? "Complete Profile" : "Continue";

      if(state.step === 3) populateSuccess();
      validateStep();
    }

    // Validate Current Step
    function validateStep() {
      let isValid = false;
      if (state.step === 1) isValid = state.selectedCategories.length > 0;
      if (state.step === 2) isValid = state.selectedCity !== null;
      if (state.step === 3) isValid = true;

      if (isValid) {
        elements.btnNext.disabled = false;
        elements.btnNext.className = "px-6 py-2.5 rounded-lg text-sm font-medium transition-all duration-200 bg-blue-600 text-white shadow-sm hover:bg-blue-700 hover:shadow cursor-pointer";
      } else {
        elements.btnNext.disabled = true;
        elements.btnNext.className = "px-6 py-2.5 rounded-lg text-sm font-medium transition-all duration-200 bg-slate-100 text-slate-400 cursor-not-allowed";
      }
    }

    // Run
    init();
  </script>
</body>
</html>
